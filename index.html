<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Chama — Non-custodial Bitcoin commerce for communities. Community trust, rendered in cryptography. 2-of-3 Shamir escrow, Nostr-native, Fedimint ecash." />
    <title>Chama — Bitcoin commerce for communities</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root {
        width: 100%; height: 100%;
        background: #0a0a0f;
        color: #e8e6e0;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Safe area padding for notch devices */
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      /* Prevent pull-to-refresh on mobile */
      body { overscroll-behavior: none; }
    </style>
    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
    <!-- Android/Chrome/PWA -->
    <link rel="manifest" href="/icons/site.webmanifest">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Chama">
    <!-- Open Graph -->
    <meta property="og:title" content="Chama — Bitcoin commerce for communities.">
    <meta property="og:description" content="Non-custodial. Nostr-native. 2-of-3 Shamir escrow. Community trust, rendered in cryptography.">
    <meta property="og:image" content="https://chama.satoshimarket.app/icons/og-banner.png">
    <meta property="og:image:width" content="1280">
    <meta property="og:image:height" content="640">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://chama.satoshimarket.app">
    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Chama — Bitcoin commerce for communities.">
    <meta name="twitter:description" content="Non-custodial. Nostr-native. 2-of-3 Shamir escrow.">
    <meta name="twitter:image" content="https://chama.satoshimarket.app/icons/og-banner.png">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
